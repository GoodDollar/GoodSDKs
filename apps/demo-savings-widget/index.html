<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoodDollar Savings Widget Demo</title>
  </head>
  <body
    style="
      margin: 0;
      background: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    "
  >
    <main
      style="
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
      "
    >
      <div style="display: flex; flex-direction: column; gap: 8px; align-items: center">
        <h1 style="margin: 0; color: #111827">Savings Widget Demo</h1>
        <p id="walletStatus" style="margin: 0; color: #4b5563">Wallet not connected</p>
        <button
          id="connectWalletButton"
          style="
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            background: #00b0ff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
          "
        >
          Connect Wallet
        </button>
      </div>

      <gooddollar-savings-widget id="savingsWidget"></gooddollar-savings-widget>
    </main>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
